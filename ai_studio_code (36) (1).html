<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Relaxed CSP to prevent Network Errors -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
    <title>vaishnavi | AI Assistant</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        :root {
            --bg: #0a0a00; --surface-1: #14140a; --surface-2: #1f1f0f;
            --text-main: #f3f3e8; --text-muted: #a3a390; --border: #333322;
            --accent: #F59E0B; --accent-grad: linear-gradient(135deg, #F59E0B, #D97706);
            --danger: #ef4444; --success: #10b981;
            --sidebar-width: 280px; --radius-md: 12px; --transition: 0.22s ease;
        }
        [data-theme="light"] {
            --bg: #fffbeb; --surface-1: #fef8e0; --surface-2: #fde68a;
            --text-main: #451a03; --text-muted: #78350f; --border: #fcd34d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--surface-1); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform var(--transition); z-index: 100; }
        .sidebar-header { padding: 20px; }
        .brand { font-family: 'Syne', sans-serif; font-size: 24px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .new-chat-btn { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; text-align: left; cursor: pointer; }
        .history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item { padding: 10px; border-radius: 8px; margin-bottom: 5px; cursor: pointer; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.7; }
        .history-item.active { background: var(--surface-2); opacity: 1; border: 1px solid var(--border); }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
        .topbar { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        /* Chat Area */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .message-row { display: flex; gap: 15px; max-width: 850px; margin: 0 auto 25px auto; width: 100%; animation: fade 0.3s ease; }
        .msg-user { flex-direction: row-reverse; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 8px; display: grid; place-items: center; font-size: 18px; flex-shrink: 0; }
        .msg-user .msg-avatar { background: var(--accent-grad); }
        .msg-ai .msg-avatar { background: var(--surface-2); border: 1px solid var(--border); }
        .msg-content { padding: 12px 18px; border-radius: 12px; max-width: 80%; line-height: 1.6; }
        .msg-user .msg-content { background: var(--surface-2); }
        
        /* Image Display Card */
        .img-card { margin-top: 10px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #000; position: relative; }
        .img-card img { width: 100%; display: block; min-height: 200px; transition: opacity 0.5s; }
        .img-actions { position: absolute; bottom: 10px; right: 10px; display: flex; gap: 8px; opacity: 0; transition: 0.3s; }
        .img-card:hover .img-actions { opacity: 1; }
        .img-btn { background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; font-size: 12px; color: white; border: 1px solid #fff3; }

        /* Input Section */
        .input-section { padding: 20px; max-width: 850px; margin: 0 auto; width: 100%; }
        
        /* Mode Toggle Tabs */
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { padding: 6px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); opacity: 0.6; }
        .tab-btn.active { opacity: 1; background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        .input-wrapper { background: var(--surface-1); border: 1px solid var(--border); border-radius: 15px; padding: 10px 15px; display: flex; align-items: flex-end; gap: 10px; }
        .input-wrapper textarea { flex: 1; background: transparent; border: none; color: var(--text-main); outline: none; resize: none; padding: 5px 0; font-size: 15px; }
        .send-btn { background: var(--accent-grad); color: white; width: 35px; height: 35px; border-radius: 10px; display: grid; place-items: center; flex-shrink: 0; }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; place-items: center; z-index: 2000; padding: 20px; }
        .modal { background: var(--surface-1); width: 100%; max-width: 600px; border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        .modal-body { padding: 20px; }
        .modal-body input { width: 100%; padding: 12px; background: var(--surface-2); border: 1px solid var(--border); color: white; margin-bottom: 15px; border-radius: 8px; }

        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; background: var(--surface-1); border-left: 4px solid var(--accent); border-radius: 5px; z-index: 3000; animation: slideIn 0.3s ease; }

        @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; transform: translateX(-100%); height: 100%; }
            .sidebar.active { transform: translateX(0); }
            .modal { height: 100%; border-radius: 0; }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand">🐐 vaishnavi</div>
            <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
        </div>
        <div class="history-list" id="history-list"></div>
        <div style="padding: 20px; border-top: 1px solid var(--border);">
            <button onclick="openSettings()" style="font-size: 14px; opacity: 0.7;">⚙️ Settings</button>
            <div id="user-info" style="margin-top: 10px; font-size: 12px; opacity: 0.5;">Guest Session</div>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button onclick="document.getElementById('sidebar').classList.toggle('active')" style="font-size: 20px;">☰</button>
            <div id="current-title" style="font-weight: 600;">AI Chat</div>
            <button onclick="location.reload()" style="color: var(--danger);">Logout</button>
        </header>

        <div class="chat-area" id="chat-container">
            <div style="text-align: center; margin-top: 100px; opacity: 0.3;" id="empty-state">
                <span style="font-size: 50px;">🐐</span><br>
                How can I help you today?
            </div>
        </div>

        <div class="input-section">
            <div class="tabs">
                <div class="tab-btn active" id="tab-chat" onclick="setMode('chat')">💬 Chat</div>
                <div class="tab-btn" id="tab-image" onclick="setMode('image')">🎨 Image</div>
            </div>
            <div class="input-wrapper">
                <textarea id="chat-input" placeholder="Ask anything..." rows="1"></textarea>
                <button class="send-btn" id="send-btn" onclick="handleSend()">➔</button>
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <div class="modal-body">
                <h2 style="margin-bottom: 20px;">Settings</h2>
                <label style="font-size: 12px; opacity: 0.6;">OpenRouter API Key</label>
                <input type="password" id="api-key-input" value="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">
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button onclick="closeSettings()" style="padding: 10px 20px;">Cancel</button>
                    <button onclick="saveSettings()" class="send-btn" style="width: auto; padding: 0 20px;">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBj9CbNcg_CKsyoGB7FC4PYL-ZSZIQH80M",
            authDomain: "gptclone-54c6d.firebaseapp.com",
            projectId: "gptclone-54c6d",
            appId: "1:837594659178:web:aec58c33d992eaa40d8d13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const STATE = {
            mode: 'chat', // 'chat' or 'image'
            isGenerating: false,
            apiKey: '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',
            conversations: JSON.parse(localStorage.getItem('v_chats')) || [],
            currentId: null
        };

        const DOM = {
            chatContainer: document.getElementById('chat-container'),
            chatInput: document.getElementById('chat-input'),
            historyList: document.getElementById('history-list'),
            emptyState: document.getElementById('empty-state')
        };

        // Initialize App
        onAuthStateChanged(auth, user => {
            document.getElementById('login-screen')?.remove();
            if(!STATE.currentId) startNewChat();
            renderHistory();
        });

        // Forced Guest Login
        window.onload = () => {
            signInAnonymously(auth).catch(() => console.log("Local Mode Active"));
        };

        // Handle Modes
        window.setMode = (mode) => {
            STATE.mode = mode;
            document.getElementById('tab-chat').classList.toggle('active', mode === 'chat');
            document.getElementById('tab-image').classList.toggle('active', mode === 'image');
            DOM.chatInput.placeholder = mode === 'chat' ? "Ask anything..." : "Describe the image you want...";
        };

        window.handleSend = async () => {
            const prompt = DOM.chatInput.value.trim();
            if(!prompt || STATE.isGenerating) return;

            DOM.emptyState.style.display = 'none';
            appendMessage('user', prompt);
            DOM.chatInput.value = '';
            STATE.isGenerating = true;

            if(STATE.mode === 'image') {
                await generateImage(prompt);
            } else {
                await generateText(prompt);
            }
            STATE.isGenerating = false;
        };

        async function generateText(prompt) {
            const loadingMsg = appendMessage('ai', 'Thinking...');
            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${STATE.apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "openai/gpt-4o-mini",
                        messages: [{role: "user", content: prompt}]
                    })
                });
                const data = await res.json();
                loadingMsg.innerHTML = marked.parse(data.choices[0].message.content);
            } catch (e) {
                loadingMsg.innerHTML = "⚠️ Network error. Please check your API key.";
            }
        }

        async function generateImage(prompt) {
            const loadingMsg = appendMessage('ai', 'Generating your masterpiece...');
            const seed = Math.floor(Math.random() * 999999);
            const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${seed}&width=1024&height=1024&nologo=true`;

            loadingMsg.innerHTML = `
                <div class="img-card">
                    <img src="${imgUrl}" id="img-${seed}" alt="Generated Image">
                    <div class="img-actions">
                        <button class="img-btn" onclick="window.open('${imgUrl}')">Fullscreen</button>
                        <a href="${imgUrl}" download="ai-image.jpg" class="img-btn" style="text-decoration:none">Download</a>
                    </div>
                </div>
                <p style="font-size:12px; margin-top:8px; opacity:0.5 italic">"${prompt}"</p>
            `;

            document.getElementById(`img-${seed}`).onload = () => {
                DOM.chatContainer.scrollTop = DOM.chatContainer.scrollHeight;
            };
        }

        function appendMessage(role, text) {
            const row = document.createElement('div');
            row.className = `message-row msg-${role}`;
            row.innerHTML = `
                <div class="msg-avatar">${role === 'user' ? '👤' : '🐐'}</div>
                <div class="msg-content">${text}</div>
            `;
            DOM.chatContainer.appendChild(row);
            DOM.chatContainer.scrollTop = DOM.chatContainer.scrollHeight;
            return row.querySelector('.msg-content');
        }

        window.startNewChat = () => {
            STATE.currentId = Date.now();
            DOM.chatContainer.innerHTML = '';
            DOM.emptyState.style.display = 'block';
            renderHistory();
        };

        function renderHistory() {
            DOM.historyList.innerHTML = STATE.conversations.length === 0 ? 
                '<div style="text-align:center; opacity:0.3; margin-top:20px;">No chats yet</div>' : '';
        }

        window.openSettings = () => document.getElementById('settings-modal').style.display = 'grid';
        window.closeSettings = () => document.getElementById('settings-modal').style.display = 'none';
        window.saveSettings = () => {
            STATE.apiKey = document.getElementById('api-key-input').value;
            closeSettings();
            showToast("Settings Saved");
        };

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        DOM.chatInput.addEventListener('keydown', e => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
